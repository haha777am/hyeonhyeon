<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYEON HYEON </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">HYEON HYEON</div>
    <nav>
      <a href="#about">About</a>
      <a href="#collection">Collection</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-text">
      <h1>STRUCTURE / DISRUPTION</h1>
      <p>2026 Experimental Womenswear</p>
    </div>

    <!-- 여기에 메인 이미지 넣기 -->
    <!-- images 폴더에 hero.jpg 넣고 아래 src 유지 -->
    <img src="images/hero.jpg" alt="hero image">
  </section>

  <!-- About -->
  <section id="about" class="about">
    <div class="about-left">
      <h2>About</h2>
    </div>

    <div class="about-right">
      <!-- 브랜드 철학 -->
      <p>
        구조와 해체의 경계를 넘나드는 젠더리스 브랜드입니다.
      </p>
    </div>
  </section>

  <!-- Collection -->
  <section id="collection" class="collection">
    <h2>Collection</h2>

    <div class="grid">
      <!-- 이미지 1 -->
      <!-- images 폴더에 look1.jpg -->
      <div class="item">
        <img src="images/look1.jpg" alt="">
      </div>

      <!-- 이미지 2 -->
      <div class="item large">
        <img src="images/look2.jpg" alt="">
      </div>

      <!-- 이미지 3 -->
      <div class="item">
        <img src="images/look3.jpg" alt="">
      </div>

      <!-- 텍스트 블록 -->
      <div class="item text-block">
        <p>
          Collection Note.
          실루엣과 왜곡된 재단.
        </p>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="contact">
    <h2>Contact</h2>
    <!-- 인스타 주소 교체 -->
    <p>Instagram: @hyeonhyeon.official</p>
    <p>Email: hyeonhyeon.official@gmail.com</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
